<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MyFamiList — プロトタイプ</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: 'Noto Sans JP', -apple-system, system-ui, sans-serif;
    background: #e7ebe8;
    overflow: hidden;
  }
  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(120% 100% at 50% 0%, #eef2ef 0%, #dfe5e1 100%);
  }
  input, textarea, button { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body style="background-color: rgb(27, 28, 142)">
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#5E8C6A"/>
    <g fill="none" stroke="#fff" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="42" cy="72" r="4.5"/><circle cx="66" cy="72" r="4.5"/>
      <path d="M26 32h7l6 30h30l5-22H37"/>
    </g>
  </svg>
</template>
<div id="stage"><div id="root"></div></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app/theme.jsx"></script>
<script type="text/babel" src="app/data.jsx"></script>
<script type="text/babel" src="app/ui.jsx"></script>
<script type="text/babel" src="app/screens.jsx"></script>
<script type="text/babel" src="app/listdetail.jsx"></script>
<script type="text/babel" src="app/sheets.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "sage",
  "dark": false,
  "radius": "控えめ",
  "density": "ゆったり"
}/*EDITMODE-END*/;

// ── Scale device to viewport ─────────────────────────────────
function useStageScale(w, h) {
  const [scale, setScale] = useState(1);
  useEffect(() => {
    const fit = () => {
      const pad = 40;
      setScale(Math.min(1.18, (window.innerWidth - pad) / w, (window.innerHeight - pad) / h));
    };
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, [w, h]);
  return scale;
}

// horizontal slide-over for pushed screens
function SlideOver({ open, t, children }) {
  const [mounted, setMounted] = useState(open);
  const [shown, setShown] = useState(false);
  useEffect(() => {
    if (open) { setMounted(true); const tm = setTimeout(() => setShown(true), 20); return () => clearTimeout(tm); }
    else { setShown(false); const tm = setTimeout(() => setMounted(false), 340); return () => clearTimeout(tm); }
  }, [open]);
  if (!mounted) return null;
  return (
    <div style={{
      position: 'absolute', inset: 0, zIndex: 90, background: t.bg,
      transform: shown ? 'translateX(0)' : 'translateX(100%)',
      transition: 'transform .34s cubic-bezier(.3,.7,.2,1)',
      boxShadow: shown ? '-12px 0 30px rgba(0,0,0,0.10)' : 'none',
    }}>{children}</div>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const tok = getTokens(t);
  const scale = useStageScale(402, 874);

  const [loggedIn, setLoggedIn] = useState(false);
  const [plan, setPlan] = useState('free');
  const [groups, setGroups] = useState(() => [JSON.parse(JSON.stringify(GROUPS[0])), JSON.parse(JSON.stringify(GROUPS[1]))]);
  const [gid, setGid] = useState('g_yamada');
  const [tab, setTab] = useState('lists');
  const [openListId, setOpenListId] = useState(null);
  const [editItemId, setEditItemId] = useState(null);
  const [sheet, setSheet] = useState(null); // 'group' | 'invite' | 'paywall'
  const [toast, setToast] = useState(null);

  const group = groups.find(g => g.id === gid) || groups[0];
  const list = group.lists.find(l => l.id === openListId) || null;
  const editItem = list ? list.items.find(i => i.id === editItemId) : null;

  // ── mutations ──
  const updateList = (fn) => setGroups(gs => gs.map(g => g.id !== gid ? g : ({
    ...g, lists: g.lists.map(l => l.id !== openListId ? l : fn(l)),
  })));
  const toggleItem = (id) => updateList(l => ({ ...l, items: l.items.map(i => i.id === id ? { ...i, checked: !i.checked } : i) }));
  const addItem = ({ name, cat }) => updateList(l => ({ ...l, items: [{ id: nid(), name, qty: '', cat, checked: false, memo: '', by: 'me', at: '今' }, ...l.items] }));
  const saveItem = (d) => updateList(l => ({ ...l, items: l.items.map(i => i.id === d.id ? d : i) }));
  const deleteItem = (id) => updateList(l => ({ ...l, items: l.items.filter(i => i.id !== id) }));

  const doLogin = () => {
    setLoggedIn(true);
    setTimeout(() => setToast({ member: 'hana', text: '花子さんが「牛乳」を追加しました' }), 1300);
  };
  const addList = () => {
    if (plan !== 'pro' && group.lists.length >= 2) { setSheet('paywall'); return; }
    const newId = 'l_' + Math.random().toString(36).slice(2, 7);
    setGroups(gs => gs.map(g => g.id !== gid ? g : ({ ...g, lists: [...g.lists, { id: newId, name: '新しいリスト', note: '', items: [] }] })));
    setOpenListId(newId);
  };
  const addGroup = () => {
    if (plan !== 'pro') { setSheet('paywall'); return; }
    const id = 'g_' + Math.random().toString(36).slice(2, 7);
    setGroups(gs => [...gs, { id, name: '新しいグループ', emoji: '🛒', color: tok.primary, members: ['me'], lists: [] }]);
    setGid(id);
  };
  const purchase = () => {
    setPlan('pro'); setSheet(null);
    setTimeout(() => setToast({ member: null, text: '🎉 MyFamiList Pro にアップグレードしました' }), 280);
  };

  const dark = tok.dark;

  return (
    <div style={{ transform: `scale(${scale})`, transformOrigin: 'center' }}>
      <IOSDevice dark={dark}>
        <div style={{ height: '100%', position: 'relative', background: tok.bg, overflow: 'hidden' }}>
          {!loggedIn ? (
            <LoginScreen t={tok} onLogin={doLogin} />
          ) : (
            <React.Fragment>
              {/* base: tab screens */}
              <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: tok.bg }}>
                <div style={{ flex: 1, minHeight: 0, display: 'flex', flexDirection: 'column' }}>
                  {tab === 'lists' && (
                    <ListsScreen t={tok} group={group} members={MEMBERS} plan={plan}
                      onOpenList={(id) => setOpenListId(id)}
                      onSwitchGroup={() => setSheet('group')}
                      onAddList={addList} />
                  )}
                  {tab === 'members' && (
                    <MembersScreen t={tok} group={group} groups={groups} members={MEMBERS} plan={plan}
                      onInvite={() => setSheet('invite')} />
                  )}
                  {tab === 'settings' && (
                    <SettingsScreen t={tok} plan={plan} members={MEMBERS}
                      onUpgrade={() => setSheet('paywall')} />
                  )}
                </div>
                <TabBar t={tok} tab={tab} onTab={setTab} />
              </div>

              {/* pushed: list detail */}
              <SlideOver open={!!openListId} t={tok}>
                {list && (
                  <ListDetailScreen t={tok} group={group} list={list} members={MEMBERS}
                    onBack={() => setOpenListId(null)}
                    onAdd={addItem} onToggle={toggleItem}
                    onOpenItem={(id) => setEditItemId(id)}
                    onMenu={() => setSheet('invite')} />
                )}
              </SlideOver>

              <Toast msg={toast} members={MEMBERS} t={tok} onDone={() => setToast(null)} />
            </React.Fragment>
          )}

          {/* sheets */}
          <GroupPickerSheet open={sheet === 'group'} onClose={() => setSheet(null)} t={tok}
            groups={groups} members={MEMBERS} currentId={gid} plan={plan}
            onPick={setGid} onAddGroup={addGroup} />
          <InviteSheet open={sheet === 'invite'} onClose={() => setSheet(null)} t={tok}
            group={group} members={MEMBERS} plan={plan} onUpgrade={() => setSheet('paywall')} />
          <PaywallSheet open={sheet === 'paywall'} onClose={() => setSheet(null)} t={tok} onPurchase={purchase} />
          <EditItemSheet open={!!editItemId} onClose={() => setEditItemId(null)} t={tok}
            item={editItem} members={MEMBERS} color={group.color}
            onSave={saveItem} onDelete={deleteItem} />
        </div>
      </IOSDevice>

      <TweaksPanel title="Tweaks">
        <TweakSection label="カラーテーマ" />
        <TweakRadio label="グリーン系統" value={t.theme}
          options={Object.keys(THEMES).map(k => ({ value: k, label: THEMES[k].label }))}
          onChange={(v) => setTweak('theme', v)} />
        <TweakToggle label="ダークモード" value={t.dark} onChange={(v) => setTweak('dark', v)} />

        <TweakSection label="角丸・余白" />
        <TweakRadio label="角丸" value={t.radius} options={['控えめ', '標準', '大きめ']} onChange={(v) => setTweak('radius', v)} />
        <TweakRadio label="余白の密度" value={t.density} options={['コンパクト', '標準', 'ゆったり']} onChange={(v) => setTweak('density', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
